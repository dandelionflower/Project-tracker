<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F3F4F8;
    --surface: #FFFFFF;
    --border: #E4E6EE;
    --ink: #14161F;
    --ink-soft: #676C7B;
    --ink-faint: #9DA1AE;
    --accent: #4F46E5;
    --accent-soft: #EEEDFD;
    --not-started: #9CA3AF;
    --in-progress: #2563EB;
    --blocked: #DC2626;
    --done: #059669;
    --not-started-bg: #F1F2F4;
    --in-progress-bg: #E9EFFE;
    --blocked-bg: #FDECEC;
    --done-bg: #E6F5EE;
  }

  [data-theme="dark"] {
    --bg: #14161C;
    --surface: #1C1F27;
    --border: #2A2E38;
    --ink: #F0F1F5;
    --ink-soft: #A0A4B0;
    --ink-faint: #6B6F7B;
    --accent: #8583F0;
    --accent-soft: #2A2A4A;
    --not-started: #9CA3AF;
    --in-progress: #5B8DF6;
    --blocked: #F16060;
    --done: #34C285;
    --not-started-bg: #2A2C33;
    --in-progress-bg: #1E2A48;
    --blocked-bg: #402226;
    --done-bg: #1B3B2E;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #14161C;
      --surface: #1C1F27;
      --border: #2A2E38;
      --ink: #F0F1F5;
      --ink-soft: #A0A4B0;
      --ink-faint: #6B6F7B;
      --accent: #8583F0;
      --accent-soft: #2A2A4A;
      --not-started: #9CA3AF;
      --in-progress: #5B8DF6;
      --blocked: #F16060;
      --done: #34C285;
      --not-started-bg: #2A2C33;
      --in-progress-bg: #1E2A48;
      --blocked-bg: #402226;
      --done-bg: #1B3B2E;
    }
  }

  * { box-sizing: border-box; }
  body { transition: background 0.15s ease, color 0.15s ease; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 3rem 2rem;
  }
  .wrap { max-width: 1200px; margin: 0 auto; }

  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap; }
  .project-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .project-name-input {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -0.02em;
    border: 1px solid transparent;
    background: transparent;
    color: var(--ink);
    padding: 2px 6px;
    border-radius: 8px;
    min-width: 120px;
  }
  .project-name-input:hover { background: var(--bg); }
  .project-name-input:focus { outline: none; background: var(--surface); border-color: var(--accent); }
  .project-switcher {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
  }
  .project-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .project-btn:hover { background: var(--bg); color: var(--ink); }
  .project-btn-danger:hover { color: var(--blocked); background: var(--blocked-bg); }
  .subtitle { font-size: 15px; color: var(--ink-soft); margin: 0; }
  .updated { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-faint); text-align: right; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
  }
  .card .label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); margin: 0 0 8px; font-weight: 500; }
  .card .value { font-family: 'Bricolage Grotesque', sans-serif; font-size: 26px; font-weight: 600; margin: 0; }
  .card.accent .value { color: var(--accent); }
  .card.warn .value { color: var(--blocked); }

  .dashboard-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 1024px) {
    .dashboard-grid { grid-template-columns: 1fr; }
  }

  .distribution {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
  }
  .distribution .label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); margin: 0 0 10px; font-weight: 500; }

  .gantt-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
    overflow-x: auto;
    margin-bottom: 1.5rem;
  }
  .gantt-container .label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); margin: 0 0 10px; font-weight: 500; }
  #gantt-chart { min-width: 100%; }

  .activity-feed {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-height: 400px;
    overflow-y: auto;
    margin-bottom: 1.5rem;
  }
  .activity-feed .label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); margin: 0; font-weight: 500; padding: 1.1rem 1.3rem 0; }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
    color: var(--ink-faint);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); position: relative; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.rail { box-shadow: inset 4px 0 0 0 var(--row-color); }
  tbody td { padding: 8px 14px; vertical-align: middle; }

  input[type="text"], input[type="date"], select {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    padding: 6px 8px;
    font-size: 15px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    border-radius: 8px;
    color: var(--ink);
  }
  input[type="text"]:hover, input[type="date"]:hover, select:hover { background: var(--bg); }
  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    outline: none; background: var(--surface); border-color: var(--accent);
  }
  input[type="date"] { font-family: 'JetBrains Mono', monospace; font-size: 14px; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 999px; padding: 5px 10px 5px 8px;
    font-size: 14px; font-weight: 500; border: none; appearance: none;
    cursor: pointer;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  select.priority { font-size: 14px; font-weight: 600; padding: 6px 8px; }
  .priority-High { color: #8B0000 ; }
  .priority-Medium { color: #B45309; }
  .priority-Low { color: #228B22 ; }

  .overdue-date { color: var(--blocked); font-weight: 500; }

  .progress-cell { display: flex; align-items: center; gap: 10px; }
  .bar-track { flex: 1; height: 6px; border-radius: 4px; background: var(--not-started-bg); position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); }
  input[type="range"] {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; margin: 0;
  }
  .progress-pct { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-soft); min-width: 30px; text-align: right; }

  .del-btn {
    border: none; background: transparent; color: var(--ink-faint);
    cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px;
    line-height: 1;
  }
  .del-btn:hover { color: var(--blocked); background: var(--blocked-bg); }

  .add-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; font-size: 15px; color: var(--ink-soft);
    cursor: pointer; border-top: 1px solid var(--border);
    font-weight: 500;
  }
  .add-row:hover { background: var(--bg); color: var(--ink); }
  .add-row .plus {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600;
  }

  .theme-toggle {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 999px;
    width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
  }
  .theme-toggle:hover { color: var(--ink); border-color: var(--ink-faint); }

  .notify-toggle {
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 999px;
    width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .notify-toggle:hover { color: var(--ink); border-color: var(--ink-faint); }
  .notify-toggle.alarm-on {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .notify-toggle.alarm-on:hover { color: var(--accent); border-color: var(--accent); }
  .notify-toggle.alarm-on::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 999px;
    border: 1.5px solid var(--accent);
    opacity: 0;
    pointer-events: none;
  }
  .notify-toggle.alarm-on:hover::after {
    animation: notify-ring 0.9s ease-out;
  }
  @keyframes notify-ring {
    0% { opacity: 0.7; transform: scale(0.8); }
    100% { opacity: 0; transform: scale(1.35); }
  }

  .archived-btn { display: inline-flex; align-items: center; gap: 5px; }
  .archived-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 999px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
    font-family: 'JetBrains Mono', monospace;
  }

  .export-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 999px;
    height: 34px;
    padding: 0 16px;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .export-btn:hover { color: var(--ink); border-color: var(--ink-faint); }

  .save-status {
    font-size: 13px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
  }

  tr.group-header td {
    background: var(--bg);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .group-header-inner {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .group-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
  }
  .group-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-faint);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .del-category-btn {
    border: none;
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .del-category-btn:hover { color: var(--blocked); background: var(--blocked-bg); }

  .task-cell { display: flex; flex-direction: column; }
  .subtask-toggle {
    align-self: flex-start;
    border: none;
    background: transparent;
    color: var(--ink-faint);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 6px;
    margin-top: 2px;
  }
  .subtask-toggle:hover { background: var(--bg); color: var(--ink-soft); }
  .subtask-toggle.open { color: var(--accent); }

  tr.subtask-panel-row td {
    background: var(--bg);
    padding: 10px 14px 12px 24px;
    border-bottom: 1px solid var(--border);
  }
  .subtask-panel { display: flex; flex-direction: column; gap: 6px; }
  .subtask-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
  }
  .subtask-item input[type="checkbox"] { cursor: pointer; }
  .subtask-item span { flex: 1; color: var(--ink); }
  .subtask-item span.subtask-done { color: var(--ink-faint); text-decoration: line-through; }
  .subtask-item button {
    border: none;
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .subtask-item button:hover { color: var(--blocked); background: var(--blocked-bg); }
  .subtask-add { display: flex; gap: 8px; margin-top: 4px; }
  .subtask-input {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 15px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .subtask-input:focus { outline: none; border-color: var(--accent); }
  .subtask-add button {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 0 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .subtask-add button:hover { color: var(--ink); }

  .subtask-add select.dependency-select {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 15px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .subtask-add select.dependency-select:focus { outline: none; border-color: var(--accent); }

  .notes-textarea {
    width: 100%;
    min-height: 90px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    resize: vertical;
    line-height: 1.5;
  }
  .notes-textarea:focus { outline: none; border-color: var(--accent); }
  .notes-toggle {
    border: none;
    background: transparent;
    color: var(--ink-faint);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .notes-toggle:hover { background: var(--bg); color: var(--ink-soft); }
  .notes-toggle.has-notes { color: var(--accent); }

  .no-matches {
    padding: 14px;
    text-align: center;
    font-size: 14px;
    color: var(--ink-faint);
    font-style: italic;
  }

  .cat-progress-row {
    position: relative;
    height: 34px;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 8px;
    background: var(--bg);
    background: color-mix(in srgb, var(--cat-color) 22%, var(--surface));
  }
  .cat-progress-row:last-child { margin-bottom: 0; }
  .cat-progress-fill {
    position: absolute;
    inset: 0;
    background: var(--cat-color);
    transition: width 0.2s ease;
  }
  .cat-progress-label {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .cat-progress-label span:last-child {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 13px;
  }
  .cat-empty {
    font-size: 14px;
    color: var(--ink-faint);
    margin: 0;
  }

  .category-tag {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .category-tag:hover { background: var(--bg); }
  .category-tag:focus { outline: none; background: var(--surface); border-color: var(--accent); }

  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .search-input {
    flex: 1;
    min-width: 250px;
    border: 1px solid var(--border);
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .search-input::placeholder { color: var(--ink-faint); }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .toolbar-select {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--ink-soft);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .overdue-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .overdue-toggle input { cursor: pointer; }
  .drag-handle {
    cursor: grab;
    color: var(--ink-faint);
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
  }
  .drag-handle:active { cursor: grabbing; }
  .star-toggle {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    color: var(--ink-faint);
    padding: 0 2px;
  }
  .star-toggle.starred { color: #D97706; }
  .star-toggle:hover { color: #D97706; }
  .task-cell-row { display: flex; align-items: center; gap: 6px; }
  .task-cell-row input { flex: 1; }
  .task-cell-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .recurring-toggle {
    border: none;
    background: transparent;
    color: var(--ink-faint);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .recurring-toggle:hover { background: var(--bg); color: var(--ink-soft); }
  .recurring-toggle.on { color: var(--accent); }

  .deps-toggle {
    border: none;
    background: transparent;
    color: var(--ink-faint);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .deps-toggle:hover { background: var(--bg); color: var(--ink-soft); }
  .deps-toggle.open { color: var(--accent); }

  .blocked-badge {
    font-size: 12px;
    font-weight: 600;
    color: var(--blocked);
    background: var(--blocked-bg);
    border-radius: 999px;
    padding: 2px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .dep-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .dep-status-label { color: var(--ink-faint); font-size: 13px; }
  .no-deps-msg { font-size: 14px; color: var(--ink-faint); font-style: italic; }

  tr.drag-over { box-shadow: inset 0 2px 0 0 var(--accent); transition: box-shadow 0.12s ease; }
  tr.dragging { opacity: 0.4; }
  tr.dragging td { background: var(--bg); }

  .task-tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; align-items: center; }
  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: color-mix(in srgb, var(--tag-color) 16%, var(--surface));
    color: var(--tag-color);
    border-radius: 999px;
    padding: 2px 4px 2px 8px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .tag-chip button {
    border: none;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 4px;
  }
  .tag-add-btn {
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--ink-faint);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .tag-add-btn:hover { color: var(--ink-soft); border-color: var(--ink-faint); }

  .alert-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--blocked-bg);
    border: 1px solid var(--blocked);
    color: var(--blocked);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 1rem;
    font-size: 15px;
  }
  .alert-banner-text { flex: 1; }
  .alert-banner-text strong { font-weight: 600; }
  .alert-banner-dismiss {
    border: none;
    background: transparent;
    color: var(--blocked);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .alert-banner-dismiss:hover { background: rgba(0,0,0,0.06); }

  .view-toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .view-toggle-group, .quick-add-group { display: flex; gap: 8px; }
  .quick-add-btn {
    display: flex; align-items: center; gap: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 6px 14px 6px 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .quick-add-btn:hover { background: var(--bg); color: var(--ink); }
  .quick-add-btn .plus {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600;
  }
  .view-toggle-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .view-toggle-btn.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .view-toggle-btn:hover:not(.active) { color: var(--ink); }

  .bulk-action-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .bulk-action-bar span { font-size: 15px; font-weight: 600; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .bulk-action-bar button, .bulk-action-bar select {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .bulk-action-bar button:hover { background: var(--bg); }
  .bulk-action-bar .bulk-delete { color: var(--blocked); border-color: var(--blocked); }
  .bulk-action-bar .bulk-delete:hover { background: var(--blocked-bg); }
  .bulk-action-bar .bulk-clear { color: var(--ink-faint); margin-left: auto; }

  input[type="checkbox"].row-select { cursor: pointer; width: 16px; height: 16px; }

  .calendar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
  }
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 1rem;
  }
  .calendar-header button {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    font-size: 16px;
    cursor: pointer;
  }
  .calendar-header button:hover { color: var(--ink); }
  #cal-month-label {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 16px;
    min-width: 160px;
    text-align: center;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cal-weekday {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 6px;
  }
  .cal-day {
    min-height: 90px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .cal-day.other-month { opacity: 0.35; }
  .cal-day.today { border-color: var(--accent); border-width: 2px; }
  .cal-day-num { font-size: 13px; font-weight: 600; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; }
  .cal-task-chip {
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 5px;
    color: white;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .cal-task-chip.overdue-chip { outline: 1px solid var(--blocked); }
  .cal-task-chip.projected-chip { opacity: 0.55; border: 1px dashed rgba(255,255,255,0.5); }
  .cal-more { font-size: 12px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; }

  @media print {
    body { background: white; padding: 0; }
    .toolbar, .add-row, .theme-toggle, .export-btn, .notify-toggle, .subtask-toggle,
    .recurring-toggle, .drag-handle, .del-btn, .del-category-btn,
    .gantt-container, .activity-feed, input[type="range"],
    .view-toggle-row, .bulk-action-bar, .row-select, #calendar-view,
    .tag-add-btn, .tag-chip button, .deps-toggle,
    .project-switcher, .project-btn, .notes-toggle {
      display: none !important;
    }
    #table-view { display: block !important; }
    .table-card, .distribution { border: 1px solid #ccc; box-shadow: none; }
    input, select { border: none !important; color: black !important; -webkit-print-color-adjust: exact; }
    .dashboard-grid { display: block; }
    .cards { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="project-title-row">
        <input type="text" id="project-name-input" class="project-name-input" value="" aria-label="Project name" />
        <select id="project-switcher" class="project-switcher" aria-label="Switch project"></select>
        <button id="new-project-btn" class="project-btn" title="New project">+ New project</button>
        <button id="delete-project-btn" class="project-btn project-btn-danger" title="Archive this project (data is kept, restore anytime)">🗑 Delete</button>
        <button id="archived-projects-btn" class="project-btn archived-btn" title="View archived projects">🗃 Archived<span class="archived-badge" id="archived-badge" style="display:none;">0</span></button>
      </div>
      <p class="subtitle">Project Tracker with Local Storage, Gantt Chart & Activity Feed.</p>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="save-status" id="save-status"></span>
      <button class="export-btn" id="export-btn">⬇ Export to Excel</button>
      <button class="export-btn" id="print-btn">🖨 Print report</button>
      <button class="export-btn" id="json-export-btn">⬇ Backup (JSON)</button>
      <button class="export-btn" id="json-import-btn">⬆ Restore (JSON)</button>
      <input type="file" id="json-import-input" accept="application/json" style="display:none;" />
      <div class="updated" id="updated"></div>
      <button class="notify-toggle" id="notify-btn" aria-label="Toggle due alerts">🔔</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <div id="alert-banner-container"></div>

  <div class="cards">
    <div class="card accent">
      <p class="label">Overall progress</p>
      <p class="value" id="overall-progress">0%</p>
    </div>
    <div class="card warn">
      <p class="label">Overdue</p>
      <p class="value" id="overdue-count">0</p>
    </div>
    <div class="card">
      <p class="label">Tasks</p>
      <p class="value" id="task-count">0</p>
    </div>
  </div>

  <div class="dashboard-grid">
    <div>
      <div class="distribution">
        <p class="label">Status breakdown</p>
        <div id="status-progress-list"></div>
      </div>

      <div class="gantt-container">
        <p class="label">📊 Gantt Chart</p>
        <div id="gantt-chart"></div>
      </div>
    </div>

    <div>
      <div class="distribution">
        <p class="label">Category progress</p>
        <div id="category-progress-list"></div>
      </div>

      <div class="activity-feed">
        <p class="label">📝 Activity Feed</p>
        <div id="activity-feed"></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search-input" class="search-input" placeholder="Search tasks or owners…" />
    <select id="sort-select" class="toolbar-select">
      <option value="none">Default order</option>
      <option value="due">Due date (soonest first)</option>
      <option value="priority">Priority (high first)</option>
      <option value="progress">Progress (lowest first)</option>
    </select>
    <select id="tag-filter" class="toolbar-select">
      <option value="">All tags</option>
    </select>
    <label class="overdue-toggle">
      <input type="checkbox" id="overdue-only" />
      Overdue only
    </label>
    <label class="overdue-toggle">
      <input type="checkbox" id="starred-only" />
      ★ Starred only
    </label>
  </div>

  <div class="view-toggle-row">
    <div class="view-toggle-group">
      <button class="view-toggle-btn active" id="view-table-btn">📋 Table</button>
      <button class="view-toggle-btn" id="view-calendar-btn">📅 Calendar</button>
    </div>
    <div class="quick-add-group">
      <button class="quick-add-btn" id="add-row"><span class="plus">+</span> Add task</button>
      <button class="quick-add-btn" id="add-category"><span class="plus">+</span> Add category</button>
    </div>
  </div>

  <div id="bulk-action-bar" class="bulk-action-bar" style="display:none;">
    <span id="bulk-count">0 selected</span>
    <button id="bulk-done-btn">✓ Mark Done</button>
    <select id="bulk-category-select">
      <option value="">Move to category…</option>
    </select>
    <button id="bulk-delete-btn" class="bulk-delete">🗑 Delete</button>
    <button id="bulk-clear-btn" class="bulk-clear">Clear selection</button>
  </div>

  <div id="table-view">
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th style="width:3%"><input type="checkbox" id="select-all" aria-label="Select all visible tasks" /></th>
            <th style="width:17%">Task</th>
            <th style="width:9%">Owner</th>
            <th style="width:11%">Status</th>
            <th style="width:8%">Priority</th>
            <th style="width:11%">Category</th>
            <th style="width:8%">Start</th>
            <th style="width:8%">Due</th>
            <th style="width:18%">Progress</th>
            <th style="width:4%"></th>
          </tr>
        </thead>
      <tbody id="rows"></tbody>
    </table>
    </div>
  </div>


  <div id="calendar-view" style="display:none;">
    <div class="calendar-card">
      <div class="calendar-header">
        <button id="cal-prev" aria-label="Previous month">&lsaquo;</button>
        <span id="cal-month-label"></span>
        <button id="cal-next" aria-label="Next month">&rsaquo;</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
