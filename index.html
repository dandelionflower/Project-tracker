<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F3F4F8;
    --surface: #FFFFFF;
    --border: #E4E6EE;
    --ink: #14161F;
    --ink-soft: #676C7B;
    --ink-faint: #9DA1AE;
    --accent: #4F46E5;
    --accent-soft: #EEEDFD;
    --not-started: #9CA3AF;
    --in-progress: #2563EB;
    --blocked: #DC2626;
    --done: #059669;
    --not-started-bg: #F1F2F4;
    --in-progress-bg: #E9EFFE;
    --blocked-bg: #FDECEC;
    --done-bg: #E6F5EE;
  }

  [data-theme="dark"] {
    --bg: #14161C;
    --surface: #1C1F27;
    --border: #2A2E38;
    --ink: #F0F1F5;
    --ink-soft: #A0A4B0;
    --ink-faint: #6B6F7B;
    --accent: #8583F0;
    --accent-soft: #2A2A4A;
    --not-started: #9CA3AF;
    --in-progress: #5B8DF6;
    --blocked: #F16060;
    --done: #34C285;
    --not-started-bg: #2A2C33;
    --in-progress-bg: #1E2A48;
    --blocked-bg: #402226;
    --done-bg: #1B3B2E;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #14161C;
      --surface: #1C1F27;
      --border: #2A2E38;
      --ink: #F0F1F5;
      --ink-soft: #A0A4B0;
      --ink-faint: #6B6F7B;
      --accent: #8583F0;
      --accent-soft: #2A2A4A;
      --not-started: #9CA3AF;
      --in-progress: #5B8DF6;
      --blocked: #F16060;
      --done: #34C285;
      --not-started-bg: #2A2C33;
      --in-progress-bg: #1E2A48;
      --blocked-bg: #402226;
      --done-bg: #1B3B2E;
    }
  }

  * { box-sizing: border-box; }
  body { transition: background 0.15s ease, color 0.15s ease; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 3rem 2rem;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }

  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap; }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    margin: 0 0 6px;
    letter-spacing: -0.02em;
  }
  .subtitle { font-size: 13px; color: var(--ink-soft); margin: 0; }
  .updated { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); text-align: right; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
  }
  .card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); margin: 0 0 8px; font-weight: 500; }
  .card .value { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 600; margin: 0; }
  .card.accent .value { color: var(--accent); }
  .card.warn .value { color: var(--blocked); }

  .distribution-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .distribution-row .distribution { margin-bottom: 0; }

  @media (max-width: 640px) {
    .distribution-row { grid-template-columns: 1fr; }
  }

  .distribution {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
    margin-bottom: 1.5rem;
  }
  .distribution .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); margin: 0 0 10px; font-weight: 500; }
  .dist-bar { display: flex; height: 10px; border-radius: 6px; overflow: hidden; background: var(--not-started-bg); margin-bottom: 10px; }
  .dist-bar div { transition: width 0.2s ease; }
  .dist-legend { display: flex; gap: 18px; flex-wrap: wrap; }
  .dist-legend span { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; }
  .dist-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
    color: var(--ink-faint);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); position: relative; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.rail { box-shadow: inset 4px 0 0 0 var(--row-color); }
  tbody td { padding: 8px 14px; vertical-align: middle; }

  input[type="text"], input[type="date"], select {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    padding: 6px 8px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    border-radius: 8px;
    color: var(--ink);
  }
  input[type="text"]:hover, input[type="date"]:hover, select:hover { background: var(--bg); }
  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    outline: none; background: var(--surface); border-color: var(--accent);
  }
  input[type="date"] { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 999px; padding: 5px 10px 5px 8px;
    font-size: 12px; font-weight: 500; border: none; appearance: none;
    cursor: pointer;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  select.priority { font-size: 12px; font-weight: 600; padding: 6px 8px; }
  .priority-High { color: #8B0000 ; }
  .priority-Medium { color: #B45309; }
  .priority-Low { color: #228B22 ; }

  .overdue-date { color: var(--blocked); font-weight: 500; }

  .progress-cell { display: flex; align-items: center; gap: 10px; }
  .bar-track { flex: 1; height: 6px; border-radius: 4px; background: var(--not-started-bg); position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); }
  input[type="range"] {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; margin: 0;
  }
  .progress-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); min-width: 30px; text-align: right; }

  .del-btn {
    border: none; background: transparent; color: var(--ink-faint);
    cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px;
    line-height: 1;
  }
  .del-btn:hover { color: var(--blocked); background: var(--blocked-bg); }

  .add-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; font-size: 13px; color: var(--ink-soft);
    cursor: pointer; border-top: 1px solid var(--border);
    font-weight: 500;
  }
  .add-row:hover { background: var(--bg); color: var(--ink); }
  .add-row .plus {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }

  .theme-toggle {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 999px;
    width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
  }
  .theme-toggle:hover { color: var(--ink); border-color: var(--ink-faint); }

  .export-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    border-radius: 999px;
    height: 34px;
    padding: 0 16px;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
  }
  .export-btn:hover { color: var(--ink); border-color: var(--ink-faint); }

  .save-status {
    font-size: 11px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
  }

  tr.group-header td {
    background: var(--bg);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .group-header-inner {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .group-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
  }
  .group-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .del-category-btn {
    border: none;
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .del-category-btn:hover { color: var(--blocked); background: var(--blocked-bg); }

  .category-tag {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .category-tag:hover { background: var(--bg); }
  .category-tag:focus { outline: none; background: var(--surface); border-color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>Project Tracker</h1>
      <p class="subtitle">Project Tracker with Local Storage.</p>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="save-status" id="save-status"></span>
      <button class="export-btn" id="export-btn">⬇ Export to Excel</button>
      <div class="updated" id="updated"></div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <div class="cards">
    <div class="card accent">
      <p class="label">Overall progress</p>
      <p class="value" id="overall-progress">0%</p>
    </div>
    <div class="card warn">
      <p class="label">Overdue</p>
      <p class="value" id="overdue-count">0</p>
    </div>
    <div class="card">
      <p class="label">Tasks</p>
      <p class="value" id="task-count">0</p>
    </div>
  </div>

  <div class="distribution-row">
    <div class="distribution">
      <p class="label">Status breakdown</p>
      <div class="dist-bar" id="dist-bar"></div>
      <div class="dist-legend" id="dist-legend"></div>
    </div>
    <div class="distribution">
      <p class="label">Category breakdown</p>
      <div class="dist-bar" id="dist-bar-cat"></div>
      <div class="dist-legend" id="dist-legend-cat"></div>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:18%">Task</th>
          <th style="width:9%">Owner</th>
          <th style="width:12%">Status</th>
          <th style="width:8%">Priority</th>
          <th style="width:12%">Category</th>
          <th style="width:9%">Start</th>
          <th style="width:9%">Due</th>
          <th style="width:19%">Progress</th>
          <th style="width:4%"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="add-row" id="add-row"><span class="plus">+</span> Add task</div>
    <div class="add-row" id="add-category"><span class="plus">+</span> Add category</div>
  </div>

</div>

<script>
const CATEGORY_COLORS = ["#4F46E5", "#0EA5E9", "#D97706", "#DB2777", "#059669", "#7C3AED", "#DC2626", "#0891B2"];

let categories = loadCategories();

function loadCategories() {
  try {
    const saved = localStorage.getItem('project-tracker-categories');
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return ["Planning", "Data Gathering", "Testing and Deployment"];
}

function saveCategories() {
  try {
    localStorage.setItem('project-tracker-categories', JSON.stringify(categories));
  } catch (e) {}
}

const STATUS = {
  "Not started": "var(--not-started)",
  "In progress": "var(--in-progress)",
  "Blocked":     "var(--blocked)",
  "Done":        "var(--done)"
};
const STATUS_BG = {
  "Not started": "var(--not-started-bg)",
  "In progress": "var(--in-progress-bg)",
  "Blocked":     "var(--blocked-bg)",
  "Done":        "var(--done-bg)"
};

let tasks = loadTasks();

function loadTasks() {
  try {
    const saved = localStorage.getItem('project-tracker-tasks');
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return [
    { task: "Kickoff meeting", owner: "Mia", status: "Done", priority: "Medium", category: "Planning", start: "2026-06-28", due: "2026-07-01", progress: 100 },
    { task: "Draft requirements doc", owner: "Sam", status: "In progress", priority: "High", category: "Planning", start: "2026-07-02", due: "2026-07-16", progress: 60 },
    { task: "Design review", owner: "Priya", status: "Not started", priority: "Medium", category: "Data Gathering", start: "2026-07-17", due: "2026-07-22", progress: 0 },
    { task: "Vendor contract sign-off", owner: "Leo", status: "Blocked", priority: "High", category: "Testing and Deployment", start: "2026-07-05", due: "2026-07-10", progress: 20 }
  ];
}

function saveTasks() {
  try {
    localStorage.setItem('project-tracker-tasks', JSON.stringify(tasks));
    const el = document.getElementById('save-status');
    if (el) {
      el.textContent = 'saved';
      clearTimeout(saveTasks._t);
      saveTasks._t = setTimeout(() => { el.textContent = ''; }, 1500);
    }
  } catch (e) {}
}

function todayStr() { return new Date().toISOString().slice(0, 10); }

function render() {
  const rowsEl = document.getElementById('rows');
  rowsEl.innerHTML = '';

  // Group task indices by category, keeping categories order first,
  // then any leftover/uncategorized tasks in a final bucket.
  const groups = categories.map(c => ({ name: c, indices: [], deletable: true }));
  const other = { name: "Uncategorized", indices: [], deletable: false };
  tasks.forEach((t, i) => {
    const group = groups.find(g => g.name === t.category);
    if (group) group.indices.push(i); else other.indices.push(i);
  });
  const allGroups = other.indices.length ? [...groups, other] : groups;

  allGroups.forEach(group => {
    const header = document.createElement('tr');
    header.className = 'group-header';
    const count = group.indices.length;
    const avg = count
      ? Math.round(group.indices.reduce((s, i) => s + Number(tasks[i].progress), 0) / count)
      : 0;
    header.innerHTML = `
      <td colspan="9">
        <div class="group-header-inner">
          <span class="group-name">${group.name}</span>
          <span class="group-meta">
            ${count} task${count === 1 ? '' : 's'} &middot; ${avg}% avg
            ${group.deletable ? `<button class="del-category-btn" data-category="${group.name}" aria-label="Delete category ${group.name}">&times;</button>` : ''}
          </span>
        </div>
      </td>
    `;
    rowsEl.appendChild(header);

    group.indices.forEach(i => {
      const t = tasks[i];
      const tr = document.createElement('tr');
      tr.className = 'rail';
      tr.style.setProperty('--row-color', STATUS[t.status]);
      const isOverdue = t.due && t.due < todayStr() && t.status !== 'Done';

      tr.innerHTML = `
        <td>
          <input type="text" value="${t.task}" data-i="${i}" data-f="task" />
        </td>
        <td><input type="text" value="${t.owner}" data-i="${i}" data-f="owner" /></td>
        <td>
          <select class="status-pill" data-i="${i}" data-f="status" style="background:${STATUS_BG[t.status]}; color:${STATUS[t.status]};">
            ${Object.keys(STATUS).map(s => `<option value="${s}" style="color:${STATUS[s]}; background:${STATUS_BG[s]};" ${s === t.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </td>
        <td>
          <select class="priority priority-${t.priority}" data-i="${i}" data-f="priority">
            <option value="Low" style="color:#228B22;" ${t.priority === 'Low' ? 'selected' : ''}>Low</option>
            <option value="Medium" style="color:#B45309;" ${t.priority === 'Medium' ? 'selected' : ''}>Medium</option>
            <option value="High" style="color:#8B0000;" ${t.priority === 'High' ? 'selected' : ''}>High</option>
          </select>
        </td>
        <td>
          <select class="category-tag" data-i="${i}" data-f="category">
            ${categories.map(c => `<option value="${c}" ${c === t.category ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </td>
        <td><input type="date" value="${t.start || ''}" data-i="${i}" data-f="start" /></td>
        <td><input type="date" value="${t.due}" data-i="${i}" data-f="due" class="${isOverdue ? 'overdue-date' : ''}" /></td>
        <td>
          <div class="progress-cell">
            <div class="bar-track">
              <div class="bar-fill" style="width:${t.progress}%;"></div>
              <input type="range" min="0" max="100" step="5" value="${t.progress}" data-i="${i}" data-f="progress" />
            </div>
            <span class="progress-pct">${t.progress}%</span>
          </div>
        </td>
        <td><button class="del-btn" data-i="${i}" aria-label="Delete task">&times;</button></td>
      `;
      rowsEl.appendChild(tr);
    });
  });

  updateSummary();

  rowsEl.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', e => {
      const i = Number(e.target.dataset.i), f = e.target.dataset.f;
      tasks[i][f] = f === 'progress' ? Number(e.target.value) : e.target.value;
      saveTasks();

     
      if (f === 'category') {
        render();
        return;
      }

      
      const tr = e.target.closest('tr');
      const t = tasks[i];

      if (f === 'task' || f === 'owner') {
        
        return;
      }

      if (f === 'status') {
        tr.style.setProperty('--row-color', STATUS[t.status]);
        e.target.style.background = STATUS_BG[t.status];
        e.target.style.color = STATUS[t.status];
        updateSummary();
      }

      if (f === 'priority') {
        e.target.className = `priority priority-${t.priority}`;
        // don't touch updateSummary — priority isn't in the dashboard
      }

      if (f === 'due') {
        const isOverdue = t.due && t.due < todayStr() && t.status !== 'Done';
        e.target.classList.toggle('overdue-date', isOverdue);
        updateSummary();
      }

      if (f === 'progress') {
        const cell = tr.querySelector('.progress-cell');
        cell.querySelector('.bar-fill').style.width = t.progress + '%';
        cell.querySelector('.progress-pct').textContent = t.progress + '%';
        updateSummary();
      }
    });
  });

  rowsEl.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      tasks.splice(Number(e.currentTarget.dataset.i), 1);
      render();
      saveTasks();
    });
  });

  rowsEl.querySelectorAll('.del-category-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const name = e.currentTarget.dataset.category;
      const affected = tasks.filter(t => t.category === name).length;
      const msg = affected
        ? `Delete "${name}"? ${affected} task${affected === 1 ? '' : 's'} will move to Uncategorized.`
        : `Delete "${name}"?`;
      if (!confirm(msg)) return;

      tasks.forEach(t => { if (t.category === name) t.category = undefined; });
      categories = categories.filter(c => c !== name);
      saveCategories();
      saveTasks();
      render();
    });
  });
}

function updateSummary() {
  const total = tasks.length;
  const overall = total ? Math.round(tasks.reduce((s, t) => s + Number(t.progress), 0) / total) : 0;
  const overdue = tasks.filter(t => t.due && t.due < todayStr() && t.status !== 'Done').length;

  document.getElementById('overall-progress').textContent = overall + '%';
  document.getElementById('overdue-count').textContent = overdue;
  document.getElementById('task-count').textContent = total;
  document.getElementById('updated').textContent = 'as of ' + todayStr();

  const distBar = document.getElementById('dist-bar');
  const distLegend = document.getElementById('dist-legend');
  distBar.innerHTML = '';
  distLegend.innerHTML = '';
  Object.keys(STATUS).forEach(s => {
    const count = tasks.filter(t => t.status === s).length;
    const pct = total ? (count / total) * 100 : 0;
    const seg = document.createElement('div');
    seg.style.width = pct + '%';
    seg.style.background = STATUS[s];
    distBar.appendChild(seg);

    const item = document.createElement('span');
    item.innerHTML = `<span class="dot" style="background:${STATUS[s]}"></span>${s} (${count})`;
    distLegend.appendChild(item);
  });

  const distBarCat = document.getElementById('dist-bar-cat');
  const distLegendCat = document.getElementById('dist-legend-cat');
  distBarCat.innerHTML = '';
  distLegendCat.innerHTML = '';
  const catNames = [...categories];
  const uncategorizedCount = tasks.filter(t => !categories.includes(t.category)).length;
  if (uncategorizedCount) catNames.push('Uncategorized');

  catNames.forEach((name, idx) => {
    const count = name === 'Uncategorized'
      ? uncategorizedCount
      : tasks.filter(t => t.category === name).length;
    const pct = total ? (count / total) * 100 : 0;
    const color = CATEGORY_COLORS[idx % CATEGORY_COLORS.length];
    const seg = document.createElement('div');
    seg.style.width = pct + '%';
    seg.style.background = color;
    distBarCat.appendChild(seg);

    const item = document.createElement('span');
    item.innerHTML = `<span class="dot" style="background:${color}"></span>${name} (${count})`;
    distLegendCat.appendChild(item);
  });
}

document.getElementById('add-category').addEventListener('click', () => {
  const name = window.prompt('New category name:');
  if (!name) return;
  const trimmed = name.trim();
  if (!trimmed) return;
  if (categories.includes(trimmed)) {
    alert('That category already exists.');
    return;
  }
  categories.push(trimmed);
  saveCategories();
  render();
});

document.getElementById('add-row').addEventListener('click', () => {
  tasks.push({ task: 'New task', owner: '', status: 'Not started', priority: 'Medium', category: categories[0], start: todayStr(), due: todayStr(), progress: 0 });
  render();
  saveTasks();
});

document.getElementById('export-btn').addEventListener('click', () => {
  const data = tasks.map(t => ({
    Task: t.task,
    Category: t.category || '',
    Owner: t.owner,
    Status: t.status,
    Priority: t.priority,
    Start: t.start || '',
    Due: t.due,
    "% complete": t.progress / 100
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{ wch: 30 }, { wch: 18 }, { wch: 14 }, { wch: 14 }, { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let r = 1; r <= range.e.r; r++) {
    const cell = ws[XLSX.utils.encode_cell({ r, c: 7 })];
    if (cell) cell.z = '0%';
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Tracker');
  const stamp = todayStr();
  XLSX.writeFile(wb, `project_tracker_backup_${stamp}.xlsx`);
});

render();

const toggleBtn = document.getElementById('theme-toggle');
function currentIsDark() {
  const explicit = document.documentElement.getAttribute('data-theme');
  if (explicit === 'dark') return true;
  if (explicit === 'light') return false;
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function updateToggleIcon() {
  toggleBtn.textContent = currentIsDark() ? '☀️' : '🌙';
}
toggleBtn.addEventListener('click', () => {
  document.documentElement.setAttribute('data-theme', currentIsDark() ? 'light' : 'dark');
  updateToggleIcon();
});
updateToggleIcon();
</script>
</body>
</html>
